
<style>
*{box-sizing:border-box}
h2{font-size:18px;font-weight:500;margin:4px 0 2px;color:var(--color-text-primary)}
.sub{font-size:13px;color:var(--color-text-secondary);margin:0 0 20px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.filter-btn{font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--color-border-secondary)}
.card.selected{border:2px solid var(--color-border-info)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-icon{width:36px;height:36px;border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin:0 0 3px}
.card-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin:0}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px}
.badge-unique{background:#EEEDFE;color:#3C3489}
.badge-local{background:#E1F5EE;color:#085041}
.badge-global{background:#E6F1FB;color:#0C447C}
.badge-ai{background:#FAEEDA;color:#633806}
.badge-gap{background:#FAECE7;color:#712B13}
.bar-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.bar-label{font-size:10px;color:var(--color-text-tertiary);min-width:56px}
.bar-track{flex:1;height:4px;border-radius:2px;background:var(--color-border-tertiary);overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.priority-star{font-size:10px;font-weight:500;color:var(--color-text-warning);background:var(--color-background-warning);padding:2px 7px;border-radius:10px}
.detail-panel{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:18px 20px;margin-top:16px;display:none}
.detail-panel.open{display:block}
.detail-title{font-size:15px;font-weight:500;margin:0 0 6px;color:var(--color-text-primary)}
.detail-desc{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin:0 0 12px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px}
.detail-item-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px}
.detail-item-val{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.close-btn{float:right;font-size:12px;color:var(--color-text-secondary);cursor:pointer;background:none;border:none;padding:0}
.explore-btn{margin-top:12px;width:100%;font-size:13px;padding:8px}
</style>

<h2>Feature brainstorm — church platform</h2>
<p class="sub">Click any feature to explore details. Filter by category or priority.</p>

<div class="filter-row">
  <button class="filter-btn active" onclick="filter('all',this)">All features</button>
  <button class="filter-btn" onclick="filter('ai',this)"><i class="ti ti-sparkles" aria-hidden="true"></i> AI-powered</button>
  <button class="filter-btn" onclick="filter('global',this)"><i class="ti ti-world" aria-hidden="true"></i> Global edge</button>
  <button class="filter-btn" onclick="filter('local',this)"><i class="ti ti-map-pin" aria-hidden="true"></i> Africa/local edge</button>
  <button class="filter-btn" onclick="filter('gap',this)"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Competitor gap</button>
</div>

<div class="grid" id="grid"></div>

<div class="detail-panel" id="detail">
  <button class="close-btn" onclick="closeDetail()"><i class="ti ti-x" aria-hidden="true"></i> Close</button>
  <div class="detail-title" id="d-title"></div>
  <div class="detail-desc" id="d-desc"></div>
  <div class="detail-grid">
    <div class="detail-item"><div class="detail-item-label">Global reach</div><div class="detail-item-val" id="d-global"></div></div>
    <div class="detail-item"><div class="detail-item-label">Competitor gap</div><div class="detail-item-val" id="d-gap"></div></div>
    <div class="detail-item"><div class="detail-item-label">Build effort</div><div class="detail-item-val" id="d-effort"></div></div>
    <div class="detail-item"><div class="detail-item-label">Revenue impact</div><div class="detail-item-val" id="d-revenue"></div></div>
  </div>
  <div style="margin-top:12px;font-size:12px;color:var(--color-text-secondary);font-weight:500">What it unlocks</div>
  <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px;line-height:1.6" id="d-unlock"></div>
  <button class="explore-btn" id="d-btn"></button>
</div>

<script>
const features=[
  {id:1,icon:"ti-brain",iconBg:"#EEEDFE",title:"AI sermon assistant",desc:"Helps pastors draft, outline, and enhance sermons with scripture suggestions, illustrations, and commentary.",tags:["ai","global","gap"],impact:95,unique:98,effort:"Medium",globalReach:"Every church worldwide",gap:"Neither Breeze nor Planning Center has this",revenue:"Premium upsell — pastors pay for tools that save hours",unlock:"Your biggest single differentiator. No major ChMS has AI sermon prep built-in. Pastors spend 10–20 hrs/week on this.",prompt:"Help me design the AI sermon assistant feature — how it would work with scripture search, outline generation, and commentary suggestions"},
  {id:2,icon:"ti-brand-whatsapp",iconBg:"#E1F5EE",title:"WhatsApp church bot",desc:"Members check tithes, register for events, get announcements, and submit prayer requests — all inside WhatsApp.",tags:["local","global","gap"],impact:92,unique:96,effort:"Medium",globalReach:"Africa, UK, Europe, Latin America, Asia",gap:"Zero ChMS tools have native WhatsApp integration",revenue:"Massive retention driver — members use what they already have",unlock:"WhatsApp penetration in Ghana is near 100%. Diaspora churches in UK/US also heavy WhatsApp users. This alone could win the African market.",prompt:"Help me design the WhatsApp church bot integration — what flows would members use and how to connect it to the backend API"},
  {id:3,icon:"ti-heart-handshake",iconBg:"#FAECE7",title:"Pastoral care AI",desc:"Tracks member engagement patterns and alerts pastors when someone may need a visit, call, or check-in.",tags:["ai","global","gap"],impact:90,unique:94,effort:"Medium",globalReach:"Universal — all churches care about pastoral follow-up",gap:"Planning Center has basic flags; no AI-driven proactive care exists",revenue:"Core retention feature — churches stay for pastoral tools",unlock:"AI notices: member hasn't attended in 3 weeks + recent bereavement in their family record + birthday next week. Pastor gets a single alert: 'Consider visiting John Mensah this week.' No other tool does this.",prompt:"Design the pastoral care AI alert system — what triggers alerts, how to score member engagement, and what the pastor notification looks like"},
  {id:4,icon:"ti-pray",iconBg:"#EEEDFE",title:"Smart prayer wall",desc:"Digital prayer request management with AI categorisation, anonymous option, prayer chains, and praise report follow-ups.",tags:["ai","global"],impact:85,unique:80,effort:"Low",globalReach:"All church denominations globally",gap:"Breeze has none; Planning Center has basic prayer notes",revenue:"Drives daily app engagement — members return to pray",unlock:"A living prayer board that gets smarter: AI groups requests by theme (health, family, finance), auto-routes to relevant prayer teams, and follows up 30 days later asking for a praise report. Nothing else like it.",prompt:"Design the smart prayer wall feature with AI categorisation, anonymous requests, and the praise report follow-up loop"},
  {id:5,icon:"ti-building-community",iconBg:"#E6F1FB",title:"Multi-branch church management",desc:"One platform for a church with 5, 10, or 50 branches. Centralised reporting, shared resources, inter-branch events.",tags:["global","gap"],impact:93,unique:90,effort:"High",globalReach:"Large ministries globally — huge in Africa, Latin America, Korea",gap:"Planning Center is weak here; Breeze doesn't support it",revenue:"Highest-value customer segment — large churches pay premium",unlock:"Mega-churches and denominations (e.g. Lighthouse Chapel, RCCG, Word of Faith) have no affordable multi-branch tool. One headquarters dashboard that sees attendance, giving, and headcount across all branches in real time.",prompt:"Design the multi-branch architecture — how HQ dashboards, branch-level access controls, and consolidated reports would work"},
  {id:6,icon:"ti-chart-line",iconBg:"#FAEEDA",title:"AI giving intelligence",desc:"Predicts giving trends, identifies lapsed givers, tracks pledges, and generates annual giving statements automatically.",tags:["ai","global","gap"],impact:88,unique:85,effort:"Medium",globalReach:"Universal — every church tracks giving",gap:"Both competitors have basic giving; AI prediction is absent",revenue:"Direct impact on church revenue — churches see ROI immediately",unlock:"AI flags: 'Giving is down 18% vs last quarter — primarily from the 25–34 age group.' Sends personalised (not spammy) giving nudges. Auto-generates HMRC Gift Aid claims for UK churches or IRS 501(c)(3) receipts for US churches.",prompt:"Design the AI giving intelligence dashboard — what metrics to track, how to predict trends, and how the giving statement generator works"},
  {id:7,icon:"ti-mobile",iconBg:"#E1F5EE",title:"Mobile money integration",desc:"Accepts tithes and offerings via MTN Mobile Money, Vodafone Cash, AirtelTigo, M-Pesa — plus Stripe and PayPal for global.",tags:["local","global"],impact:91,unique:88,effort:"Medium",globalReach:"Africa-first; M-Pesa covers East Africa; global via Stripe",gap:"No ChMS supports African mobile money natively",revenue:"Direct giving processing — potential for % transaction fee revenue",unlock:"The only ChMS that works with how Ghanaians, Nigerians, Kenyans actually pay. Mobile money is the primary payment rail in West Africa. Add Stripe for diaspora. This removes the #1 friction in digital giving for African churches.",prompt:"How do I integrate MTN Mobile Money and Vodafone Cash APIs into the church giving module alongside Stripe for international payments"},
  {id:8,icon:"ti-baby-carriage",iconBg:"#E6F1FB",title:"Children's ministry security",desc:"Secure QR code check-in for children with allergy alerts, medical notes, guardian matching, and late-pickup notifications.",tags:["global","gap"],impact:82,unique:78,effort:"Medium",globalReach:"Universal — child safety is a priority in all churches",gap:"Planning Center Check-ins does this but is expensive standalone",revenue:"Standalone selling point — parents are extremely loyal to this",unlock:"Parents trust a church that handles their children securely. QR wristband on drop-off, medical alerts visible to nursery workers, guardian-only pickup verification. Huge in UK/US markets where child safeguarding is legally required.",prompt:"Design the children's ministry check-in system with QR codes, guardian matching, and allergy/medical alert workflows"},
  {id:9,icon:"ti-language",iconBg:"#EEEDFE",title:"AI multi-language support",desc:"Translate announcements, sermons, and notifications into local languages — Twi, Ga, Hausa, Swahili, French, Spanish, and more.",tags:["ai","local","global"],impact:87,unique:89,effort:"Medium",globalReach:"Diaspora churches, multilingual congregations globally",gap:"Neither Breeze nor Planning Center has language localisation",revenue:"Opens markets: Francophone Africa, Latin America, East Africa",unlock:"A Ghanaian church in London with Nigerian and Caribbean members can send announcements in 4 languages at once. Same system serves a Spanish-speaking church in Miami or a Swahili-speaking church in Nairobi.",prompt:"How would I implement AI multi-language translation for church announcements and notifications — what APIs to use and how to structure it"},
  {id:10,icon:"ti-users-group",iconBg:"#FAEEDA",title:"Volunteer AI matcher",desc:"Automatically matches volunteers to ministry roles based on skills, spiritual gifts assessment, availability, and past service.",tags:["ai","global"],impact:80,unique:82,effort:"Medium",globalReach:"Universal — all churches rely on volunteers",gap:"Planning Center has volunteer scheduling; no AI matching exists",revenue:"Reduces admin burden — churches pay to save coordinator time",unlock:"Member fills in a 5-minute spiritual gifts quiz. AI matches them to: worship team, ushering, children's ministry, tech team. Coordinator sees ranked suggestions. Volunteer burnout drops because people serve where they fit.",prompt:"Design the volunteer AI matcher — how the spiritual gifts assessment works, what matching algorithm to use, and how coordinators manage it"},
  {id:11,icon:"ti-trending-up",iconBg:"#E1F5EE",title:"Church health dashboard",desc:"AI-generated weekly insights on attendance trends, giving patterns, member engagement, and growth forecasts.",tags:["ai","global","gap"],impact:86,unique:84,effort:"Medium",globalReach:"Every church leader wants growth metrics",gap:"Both competitors have reports; AI narrative insights are absent",revenue:"Premium tier feature — leadership teams pay for strategy tools",unlock:"Monday morning, the senior pastor gets: 'Attendance grew 4% this month. New member retention is down — 60% of March visitors haven't returned. Suggested action: follow up this week.' Like a church consultant in the dashboard.",prompt:"Design the church health AI dashboard — what metrics matter, how to generate natural language insights, and what the weekly report looks like"},
  {id:12,icon:"ti-video",iconBg:"#FAECE7",title:"Sermon archive + podcast auto-generator",desc:"Upload or record sermons; AI generates searchable transcripts, chapter markers, and auto-publishes as a podcast episode.",tags:["ai","global"],impact:83,unique:86,effort:"Medium",globalReach:"Every church with media ministry — huge global appeal",gap:"No ChMS auto-publishes to podcast platforms built-in",revenue:"Media churches pay premium; reaches unchurched via podcast",unlock:"Pastor preaches. Staff uploads video. AI transcribes, adds timestamps, writes a summary, suggests a podcast title, and publishes to Spotify, Apple Podcasts, and the church app — automatically. Planning Center can't touch this.",prompt:"How would I build the sermon-to-podcast pipeline — transcription, chapter generation, and auto-publish to podcast platforms"},
  {id:13,icon:"ti-seedling",iconBg:"#E1F5EE",title:"Spiritual growth tracker",desc:"Tracks each member's discipleship milestones: salvation, baptism, small group, serving, mentorship, and faith maturity.",tags:["global"],impact:78,unique:75,effort:"Low",globalReach:"Core to discipleship-focused churches globally",gap:"Breeze has basic milestone tracking; no journey visualisation",revenue:"Keeps members engaged long-term — reduces churn from the app",unlock:"Members see their own spiritual journey timeline. Pastors see congregation-wide discipleship health. Identify who is ready for leadership. Churches that disciple well retain members — and long-term members give more.",prompt:"Design the spiritual growth tracker — what milestones to track, how to visualise the member journey, and what insights pastors see"},
  {id:14,icon:"ti-calendar-event",iconBg:"#E6F1FB",title:"AI event planner + ticketing",desc:"AI helps plan events, suggests optimal timing, manages registration, sends reminders, and handles paid ticketing for conferences.",tags:["ai","global"],impact:81,unique:77,effort:"Medium",globalReach:"Universal — conferences, revivals, youth events are global",gap:"Planning Center Registrations does this but is an extra paid add-on",revenue:"Transaction fee on ticketed events is direct recurring revenue",unlock:"Church conference with 500 seats — online registration, waitlists, reminder sequences, name badge printing list, day-of check-in QR codes, and post-event survey. All in one. No separate Eventbrite needed.",prompt:"Design the AI event planning and ticketing module — registration flow, reminder sequences, and day-of check-in QR codes"},
];

let selected=null,activeFilter='all';

function filter(tag,btn){
  activeFilter=tag;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
  closeDetail();
}

function render(){
  const g=document.getElementById('grid');
  const visible=activeFilter==='all'?features:features.filter(f=>f.tags.includes(activeFilter));
  g.innerHTML=visible.map(f=>`
    <div class="card${selected===f.id?' selected':''}" onclick="showDetail(${f.id})">
      <div class="card-top">
        <div style="display:flex;gap:10px;align-items:flex-start;min-width:0">
          <div class="card-icon" style="background:${f.iconBg}"><i class="ti ${f.icon}" style="color:var(--color-text-primary)" aria-hidden="true"></i></div>
          <div style="min-width:0">
            <div class="card-title">${f.title}</div>
            <div class="card-desc">${f.desc}</div>
          </div>
        </div>
        ${f.impact>=90?`<span class="priority-star"><i class="ti ti-star" aria-hidden="true"></i> Top pick</span>`:''}
      </div>
      <div class="bar-row"><span class="bar-label" style="font-size:10px;color:var(--color-text-tertiary)">Impact</span><div class="bar-track"><div class="bar-fill" style="width:${f.impact}%;background:#1D9E75"></div></div><span style="font-size:10px;color:var(--color-text-secondary);min-width:26px;text-align:right">${f.impact}%</span></div>
      <div class="bar-row"><span class="bar-label" style="font-size:10px;color:var(--color-text-tertiary)">Uniqueness</span><div class="bar-track"><div class="bar-fill" style="width:${f.unique}%;background:#534AB7"></div></div><span style="font-size:10px;color:var(--color-text-secondary);min-width:26px;text-align:right">${f.unique}%</span></div>
      <div class="badge-row">
        ${f.tags.includes('ai')?'<span class="badge badge-ai"><i class="ti ti-sparkles" aria-hidden="true"></i> AI</span>':''}
        ${f.tags.includes('global')?'<span class="badge badge-global"><i class="ti ti-world" aria-hidden="true"></i> Global</span>':''}
        ${f.tags.includes('local')?'<span class="badge badge-local"><i class="ti ti-map-pin" aria-hidden="true"></i> Africa edge</span>':''}
        ${f.tags.includes('gap')?'<span class="badge badge-gap"><i class="ti ti-bolt" aria-hidden="true"></i> Competitor gap</span>':''}
      </div>
    </div>
  `).join('');
}

function showDetail(id){
  const f=features.find(x=>x.id===id);
  selected=id;
  document.getElementById('d-title').textContent=f.title;
  document.getElementById('d-desc').textContent=f.desc;
  document.getElementById('d-global').textContent=f.globalReach;
  document.getElementById('d-gap').textContent=f.gap;
  document.getElementById('d-effort').textContent=f.effort+' build';
  document.getElementById('d-revenue').textContent=f.revenue;
  document.getElementById('d-unlock').textContent=f.unlock;
  const btn=document.getElementById('d-btn');
  btn.textContent='Deep-dive into this feature ↗';
  btn.onclick=()=>sendPrompt(f.prompt);
  document.getElementById('detail').classList.add('open');
  render();
}

function closeDetail(){
  selected=null;
  document.getElementById('detail').classList.remove('open');
  render();
}

render();
</script>
